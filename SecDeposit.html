Chart.defaults.color = '#5b6472';
Chart.defaults.borderColor = '#e6e9f0';
Chart.defaults.font.family = '"Noto Sans TC",-apple-system,sans-serif';

const PALETTE = ['#4f46e5','#dc2626','#0d9488','#d97706'];
function seriesByKey(k){ return D.series.find(s => s.k === k); }
function colorFor(i){ return PALETTE[i % PALETTE.length]; }
function fmtNum(x, digits){ return x==null ? '－' : x.toLocaleString('zh-TW', {maximumFractionDigits: digits==null?1:digits}); }

function renderStatCards(){
  const box = document.getElementById('stat-cards');
  const bal = seriesByKey('eom_bal'), idx = seriesByKey('index'), contrib = seriesByKey('m1b_contrib');
  const li = D.months.length - 1;
  box.innerHTML = [
    {k:'最新月份', v: D.months[li] || '－'},
    {k:'劃撥存款月底餘額', v: fmtNum(bal.v[li])+' 億元'},
    {k:'股價指數(月平均)', v: fmtNum(idx.v[li])},
    {k:'對M1B年增率貢獻率', v: fmtNum(contrib.v[li],2)+'%'},
  ].map(it => `<div class="scard"><div class="k">${it.k}</div><div class="v">${it.v}</div></div>`).join('');
}

function fillRangeSelects(fromEl, toEl, monthsBack){
  fromEl.innerHTML = ''; toEl.innerHTML = '';
  D.months.forEach(m => { fromEl.add(new Option(m, m)); toEl.add(new Option(m, m)); });
  const start = Math.max(0, D.months.length - (monthsBack || 121));
  fromEl.value = D.months[start]; toEl.value = D.months[D.months.length - 1];
}
function rangeIdx(fromEl, toEl){
  let a = D.months.indexOf(fromEl.value), b = D.months.indexOf(toEl.value);
  if(a > b) [a, b] = [b, a];
  return [a, b];
}

// ---------- ① 劃撥餘額 vs 股價指數 ----------
const idxFrom = document.getElementById('idx-from'), idxTo = document.getElementById('idx-to');
fillRangeSelects(idxFrom, idxTo, 36); // 預設近 3 年
let idxChart;
function drawIdx(){
  const [a, b] = rangeIdx(idxFrom, idxTo);
  const labels = D.months.slice(a, b + 1);
  const bal = seriesByKey('eom_bal'), stockIdx = seriesByKey('index');
  if(idxChart) idxChart.destroy();
  idxChart = new Chart(document.getElementById('idx-chart'), {type:'line',
    data:{labels, datasets:[
      {label:'劃撥存款月底餘額(億元)', data: bal.v.slice(a,b+1), borderColor:colorFor(0), backgroundColor:colorFor(0),
        spanGaps:true, pointRadius:0, borderWidth:2, tension:.2, yAxisID:'y'},
      {label:'股價指數(月平均)', data: stockIdx.v.slice(a,b+1), borderColor:colorFor(1), backgroundColor:colorFor(1),
        spanGaps:true, pointRadius:0, borderWidth:2, tension:.2, yAxisID:'y1'},
    ]},
    options:{responsive:true, maintainAspectRatio:false, interaction:{mode:'nearest', intersect:false},
      plugins:{legend:{position:'bottom'}},
      scales:{y:{position:'left', title:{display:true,text:'億元'}}, y1:{position:'right', title:{display:true,text:'股價指數'}, grid:{drawOnChartArea:false}}}}});
}
idxFrom.addEventListener('change', drawIdx);
idxTo.addEventListener('change', drawIdx);

// ---------- ② 增減金額與融資餘額 ----------
const flowFrom = document.getElementById('flow-from'), flowTo = document.getElementById('flow-to');
fillRangeSelects(flowFrom, flowTo, 36); // 預設近 3 年
let flowChart;
function drawFlow(){
  const [a, b] = rangeIdx(flowFrom, flowTo);
  const labels = D.months.slice(a, b + 1);
  const chg = seriesByKey('eom_chg'), margin = seriesByKey('margin');
  if(flowChart) flowChart.destroy();
  flowChart = new Chart(document.getElementById('flow-chart'), {type:'line',
    data:{labels, datasets:[
      {label:'月底增減金額(億元)', data: chg.v.slice(a,b+1), borderColor:colorFor(0), backgroundColor:colorFor(0),
        spanGaps:true, pointRadius:0, borderWidth:2, tension:.2},
      {label:'股市融資金額(月底餘額,億元)', data: margin.v.slice(a,b+1), borderColor:colorFor(2), backgroundColor:colorFor(2),
        spanGaps:true, pointRadius:0, borderWidth:2, tension:.2},
    ]},
    options:{responsive:true, maintainAspectRatio:false, interaction:{mode:'nearest', intersect:false},
      plugins:{legend:{position:'bottom'}}, scales:{y:{title:{display:true,text:'億元'}}}}});
}
flowFrom.addEventListener('change', drawFlow);
flowTo.addEventListener('change', drawFlow);

// ---------- ③ 對M1B貢獻率 ----------
const contribFrom = document.getElementById('contrib-from'), contribTo = document.getElementById('contrib-to');
fillRangeSelects(contribFrom, contribTo, 36); // 預設近 3 年
let contribChart;
function drawContrib(){
  const [a, b] = rangeIdx(contribFrom, contribTo);
  const labels = D.months.slice(a, b + 1);
  const contrib = seriesByKey('m1b_contrib');
  if(contribChart) contribChart.destroy();
  contribChart = new Chart(document.getElementById('contrib-chart'), {type:'line',
    data:{labels, datasets:[{label:'對M1B年增率之貢獻率(%)', data: contrib.v.slice(a,b+1), borderColor:colorFor(0),
      backgroundColor:colorFor(0)+'33', fill:true, spanGaps:true, pointRadius:0, borderWidth:2, tension:.2}]},
    options:{responsive:true, maintainAspectRatio:false, interaction:{mode:'nearest', intersect:false},
      plugins:{legend:{position:'bottom'}}, scales:{y:{title:{display:true,text:'%'}}}}});
}
contribFrom.addEventListener('change', drawContrib);
contribTo.addEventListener('change', drawContrib);

// ---------- ④ 資料表（下拉選單選月份） ----------
const tableMonthSel = document.getElementById('table-month');
D.months.forEach(m => tableMonthSel.add(new Option(m, m)));
tableMonthSel.value = D.months[D.months.length - 1];
function renderSummaryTable(){
  const idx = D.months.indexOf(tableMonthSel.value);
  const tbody = document.querySelector('#summary-table tbody');
  tbody.innerHTML = D.series.map(s => `<tr><td>${s.n}</td><td>${fmtNum(s.v[idx])}</td></tr>`).join('');
}
tableMonthSel.addEventListener('change', renderSummaryTable);

// ---------- tab 切換 ----------
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x===t));
  document.querySelectorAll('section').forEach(s => s.classList.toggle('show', s.id === 'sec-'+t.dataset.sec));
}));

// ---------- footer ----------
function renderFooter(){
  document.getElementById('footer').innerHTML =
    `資料期別：${D.src_label || '－'}｜管線產生日：${D.updated || '－'}｜資料來源：<a href="https://www.cbc.gov.tw/tw/cp-974-104914-490d9-1.html" target="_blank" rel="noopener">中央銀行「證券劃撥存款」</a><div class="note">${D.note || ''}</div>`;
}

// ---------- init ----------
function init(){
  if(!D.months.length){
    document.querySelector('.wrap').insertAdjacentHTML('afterbegin',
      '<div class="panel" style="border-color:#dc2626"><h2 style="color:#dc2626">尚無資料</h2>' +
      '<div class="hint">管線尚未執行過首次更新，請執行資料更新管線後重新整理。</div></div>');
    return;
  }
  renderStatCards();
  drawIdx(); drawFlow(); drawContrib();
  renderSummaryTable();
  renderFooter();
}
init();
</script>
